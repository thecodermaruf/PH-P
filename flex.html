<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="image/MindSpark BD Logo with Light Bulb and Brain Silhouette.png"
        type="image/x-icon">

    <title>Flexbox</title>
    <style>
        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* Nav start */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo img {
            width: 80px;
            height: 40px;
            cursor: pointer;
        }

        .menu ul li {
            display: inline-block;
            text-align: left;
            list-style: none;
            margin: 12px;
        }

        ul li a {
            text-decoration: none;
            color: black;
            font-size: 18px;
            transition: all ease .3s;
        }

        ul li a:hover {
            color: #244D5F;
            /* font-size: 19px; */
            font-weight: 600;
            background-color: transparent;
            padding: 8px 10px;
        }

        button {
            padding: 7px 12px;
            border-radius: 5px;
            background-color: #244D5F;
            color: white;
            margin-left: 10px;
            cursor: pointer;
            transition: all ease .3s;
        }

        button:hover {
            background-color: rgba(255, 255, 255, 0.423);
            color: black;
            border: solid 2px #244D5F;
        }

        /* nav end */

        /* colors start */
        .colors {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            gap: 10px;
        }

        .colors div {
            width: 350px;
            height: 500px;
            border: solid 2px #244D5F;
        }

        .color {
            text-align: center;
        }

        /* colors end */
    </style>
</head>

<body>
    <main class="container">
        <nav>
            <div class="logo">
                <img src="image/MindSpark BD Logo with Light Bulb and Brain Silhouette.png" alt="image">
            </div>
            <div class="menu">
                <ul>
                    <li><a href="about.html">About</a></li>
                    <li><a href="home.html">Home</a></li>
                    <li><a href="table.html">Table</a></li>
                    <li><a href="flex.html">Flexbox</a></li>
                    <li><a href="grid.html">Grid</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </div>
            <button class="btn" type="button">login</button>
        </nav>
        <section>
            <div class="colors">
                <div class="color">Red</div>
                <div class="color">Green</div>
                <div class="color">Blue</div>
            </div>
        </section>

        <section>
            <div class="card">Card-1</div>
            <div class="card">Card-2</div>
            <div class="card">Card-3</div>
            <div class="card">Card-4</div>
        </section>

        <section>
            <div class="photo-gallery">
                <div>1</div>
                <div>2</div>
                <div>3</div>
                <div>4</div>
                <div>5</div>
                <div>6</div>
                <div>7</div>
                <div>8</div>
            </div>
        </section>

        <section>
            <form class="login"></form>
        </section>
    </main>
</body>

</html>
